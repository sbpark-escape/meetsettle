services:
  - type: web
    name: meetsettle-api
    runtime: docker
    autoDeployTrigger: checksPass
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: APPLY_MIGRATIONS
        value: "true"
      - key: ENABLE_SWAGGER
        value: "true"
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
